stages:
  - test

frontend-build:
  stage: test
  image: node:18-alpine
  script:
    - cd frontend
    - npm install
    - npm run build

backend-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libgl1-mesa-glx libglib2.0-0 build-essential
    - cd backend
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests/
